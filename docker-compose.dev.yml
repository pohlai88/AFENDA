services:
  postgres:
    image: postgres:17.9
    environment:
      POSTGRES_USER: afenda
      POSTGRES_PASSWORD: afenda
      POSTGRES_DB: afenda_dev
    ports:
      - "5433:5432"
    volumes:
      - afenda_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afenda -d afenda_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Observability ────────────────────────────────────────────────────────────
  # Jaeger v2 — all-in-one trace collector + UI.
  # OTLP endpoints: gRPC :4317, HTTP :4318. UI: :16686.
  # v2 uses built-in OTel Collector config (badger storage by default).
  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    volumes:
      - afenda_jaeger:/tmp/jaeger # v2 default badger path
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:13133 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Optional local S3-compatible storage
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio12345
    volumes:
      - afenda_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  afenda_pg:
  afenda_jaeger:
  afenda_minio:
