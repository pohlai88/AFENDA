name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.30.3"

jobs:
  gate-tests-pr:
    name: CI Gates + PR Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C apps/web exec playwright install chromium --with-deps
      - run: pnpm test:suite:pr:required -- --base-ref=origin/${{ github.base_ref }}

  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: actions/cache@v4
        id: turbo-cache
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml', 'pnpm-workspace.yaml', 'turbo.json', 'package.json', 'tsconfig.base.json', 'eslint.config.js', '.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-main-
            ${{ runner.os }}-turbo-
      - name: Turbo Cache Status
        run: |
          echo "turbo-cache-hit=${{ steps.turbo-cache.outputs.cache-hit }}"
          du -sh .turbo/cache 2>/dev/null || echo "No local turbo cache directory"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm format:check

  gate-tests-main:
    name: CI Gates + Main Tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: afenda
          POSTGRES_PASSWORD: afenda
          POSTGRES_DB: afenda_ci
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U afenda -d afenda_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://afenda:afenda@localhost:5433/afenda_ci
      DATABASE_URL_DIRECT: postgresql://afenda:afenda@localhost:5433/afenda_ci
      NEON_AUTH_BASE_URL: http://localhost:4500/neondb/auth
      NEON_AUTH_COOKIE_SECRET: ci-test-cookie-secret-32bytes-min
      AUTH_CHALLENGE_SECRET: a1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef123456
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C apps/web exec playwright install chromium --with-deps
      - run: pnpm test:suite:main:required
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: ci-main-artifacts
          path: |
            apps/*/coverage/
            packages/*/coverage/
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 30

  pr-required:
    name: PR Required Checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [lint-typecheck, gate-tests-pr]
    steps:
      - run: echo "PR required checks passed"

  push-required:
    name: Main Required Checks
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [lint-typecheck, gate-tests-main]
    steps:
      - run: echo "Main required checks passed"
